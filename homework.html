<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- 左侧侧边栏 -->
        <div class="w-64 bg-white shadow-md overflow-y-auto flex flex-col">
            <div class="p-4 border-b">
                <h1 class="text-xl font-bold text-gray-800">作业记录</h1>
                <button id="refreshBtn" class="mt-2 w-full py-2 px-4 bg-blue-500 text-white rounded hover:bg-blue-600 transition flex items-center justify-center">
                    <i class="fa fa-refresh mr-2"></i>刷新作业列表
                </button>
            </div>
            
            <div id="dateList" class="flex-1 overflow-y-auto p-2"></div>
            <button id="toggleHistoryBtn" class="py-2 text-sm text-gray-600 hover:bg-gray-100">
                显示历史作业
            </button>
        </div>

        <!-- 右侧主内容区域 -->
        <div class="flex-1 p-6 overflow-y-auto">
            <div id="contentArea" class="bg-white rounded-lg shadow p-6 min-h-[calc(100vh-2rem)]">
                <div class="text-center text-gray-500 py-12">
                    <i class="fa fa-calendar-o text-4xl mb-4"></i>
                    <p>请从左侧选择一个日期查看作业内容</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PRIORITY_DAYS = 3;
        const MONTHS_TO_CHECK = 3;
        let allFiles = [];
        let showHistory = false;

        // 页面加载逻辑（移除无限刷新，兼容Cloudflare）
        document.addEventListener('DOMContentLoaded', () => {
            loadHomeworkFiles();
            document.getElementById('refreshBtn').addEventListener('click', () => {
                loadHomeworkFiles(true);
            });
        });

        // 生成日期
        function generateDates() {
            const dates = [];
            const today = new Date();

            for (let i = 0; i < PRIORITY_DAYS; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() - i);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const dateStr = `${year}${month}${day}`;
                const displayDate = `${year}年${month}月${day}日`;
                
                dates.unshift({
                    dateStr,
                    displayDate,
                    fileName: `${dateStr}.html`,
                    isPriority: true
                });
            }

            for (let month = 1; month <= MONTHS_TO_CHECK; month++) {
                const date = new Date(today);
                date.setMonth(today.getMonth() - month);
                
                for (let day = 1; day <= 31; day++) {
                    const checkDate = new Date(date.getFullYear(), date.getMonth(), day);
                    if (checkDate.getMonth() !== date.getMonth()) continue;

                    const year = checkDate.getFullYear();
                    const monthStr = String(checkDate.getMonth() + 1).padStart(2, '0');
                    const dayStr = String(checkDate.getDate()).padStart(2, '0');
                    const dateStr = `${year}${monthStr}${dayStr}`;
                    const displayDate = `${year}年${monthStr}月${dayStr}日`;

                    if (!dates.some(d => d.dateStr === dateStr)) {
                        dates.push({
                            dateStr,
                            displayDate,
                            fileName: `${dateStr}.html`,
                            isPriority: false
                        });
                    }
                }
            }

            return dates;
        }

        // 检查文件是否存在（Cloudflare兼容）
        async function checkFileExists(fileName, forceRefresh = false) {
            try {
                const url = forceRefresh ? `${fileName}?t=${Date.now()}` : fileName;
                const response = await fetch(url, { 
                    method: 'GET',
                    cache: forceRefresh ? 'no-store' : 'default'
                });
                return response.status === 200;
            } catch (error) {
                return false;
            }
        }

        // 加载文件内容（带强制刷新、不存在友好提示）
        async function loadFileContent(fileName, forceRefresh = false) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="text-center py-12"><i class="fa fa-spinner fa-spin text-2xl"></i></div>';
            
            try {
                const url = forceRefresh ? `${fileName}?t=${Date.now()}` : fileName;
                const response = await fetch(url);
                
                if (response.ok) {
                    return await response.text();
                } else {
                    return `
                        <div class="text-center text-gray-500 py-12">
                            <i class="fa fa-folder-open-o text-4xl mb-4"></i>
                            <p>该日期暂无作业内容</p>
                        </div>
                    `;
                }
            } catch (error) {
                return `
                    <div class="text-center text-red-500 py-12">
                        <i class="fa fa-exclamation-circle text-4xl mb-4"></i>
                        <p>加载失败，请重试</p>
                    </div>
                `;
            }
        }

        // 渲染日期列表
        function renderDateList(files) {
            const dateListElement = document.getElementById('dateList');
            dateListElement.innerHTML = '';

            const priorityFiles = files.filter(f => f.isPriority);
            const otherFiles = files.filter(f => !f.isPriority);

            priorityFiles.forEach(file => {
                const button = document.createElement('button');
                button.className = 'w-full text-left p-3 rounded-lg mb-2 hover:bg-blue-50 transition border border-gray-100';
                button.innerHTML = `
                    <div class="font-medium">${file.dateStr}</div>
                    <div class="text-xs text-gray-500">${file.displayDate}</div>
                `;
                button.addEventListener('click', async () => {
                    document.getElementById('contentArea').innerHTML = await loadFileContent(file.fileName, true);
                });
                dateListElement.appendChild(button);
            });

            const toggleBtn = document.getElementById('toggleHistoryBtn');
            if (otherFiles.length > 0) {
                toggleBtn.style.display = 'block';
                if (showHistory) {
                    otherFiles.forEach(file => {
                        const button = document.createElement('button');
                        button.className = 'w-full text-left p-3 rounded-lg mb-2 hover:bg-blue-50 transition border border-gray-100';
                        button.innerHTML = `
                            <div class="font-medium">${file.dateStr}</div>
                            <div class="text-xs text-gray-500">${file.displayDate}</div>
                        `;
                        button.addEventListener('click', async () => {
                            document.getElementById('contentArea').innerHTML = await loadFileContent(file.fileName, true);
                        });
                        dateListElement.appendChild(button);
                    });
                    toggleBtn.textContent = '隐藏历史作业';
                } else {
                    toggleBtn.textContent = '显示历史作业';
                }
            } else {
                toggleBtn.style.display = 'none';
            }
        }

        // 加载作业列表主函数
        async function loadHomeworkFiles(forceRefresh = false) {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>加载中...';

            try {
                const dates = generateDates();
                const existingFiles = [];

                for (const date of dates) {
                    const exists = await checkFileExists(date.fileName, forceRefresh);
                    if (exists) {
                        existingFiles.push(date);
                    }
                }

                allFiles = existingFiles;
                renderDateList(allFiles);
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = '<i class="fa fa-refresh mr-2"></i>刷新作业列表';
            }
        }

        // 切换历史作业
        document.getElementById('toggleHistoryBtn').addEventListener('click', () => {
            showHistory = !showHistory;
            renderDateList(allFiles);
        });
    </script>
</body>
</html>
